# Cloudflare Pages プロジェクト設定 (サイト本体 + Functions)
name = "kyoudai-coorde"
pages_build_output_dir = "public"
compatibility_date = "2026-06-01"

# cron Worker (worker/) が書き込む KV を Pages Functions から読み出す
[[kv_namespaces]]
binding = "COORDE_KV"
id = "cab4b705a9404b2baddc8844cfe1629c"

# 西松屋商品画像の read-through ミラー (/img/* が使用)。
# ユーザーのブラウザから 24028-net.jp へ直接画像リクエストを送らせないための永続キャッシュ。
[[r2_buckets]]
binding = "COORDE_IMG"
bucket_name = "nishimatsuya-coorde-img"
